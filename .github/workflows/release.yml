name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Stage 1: Create a draft GitHub Release
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "OpenWire ${{ github.ref_name }}" \
            --generate-notes \
            --draft

  # Stage 2: Build, sign, and upload for each platform
  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: openwire-macos-arm
            ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: openwire-macos-intel
            ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: openwire-linux-x86_64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: openwire-windows-x86_64
            ext: zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      # Sync Cargo.toml version from git tag (strip leading 'v')
      - name: Set version from tag (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
          echo "Building version ${VERSION}"

      - name: Set version from tag (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content Cargo.toml
          Write-Host "Building version $version"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      # Ad-hoc codesign with Hardened Runtime + network entitlements (macOS)
      - name: Ad-hoc sign with network entitlements (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --options runtime \
            --entitlements entitlements.plist \
            --sign - \
            target/${{ matrix.target }}/release/openwire

      - name: Verify signed entitlements (macOS)
        if: runner.os == 'macOS'
        run: |
          codesign --verify --verbose target/${{ matrix.target }}/release/openwire
          codesign -d --entitlements :- target/${{ matrix.target }}/release/openwire

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz openwire
          cd ../../..

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/openwire.exe" -DestinationPath "${{ matrix.name }}.zip"

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} ${{ matrix.name }}.${{ matrix.ext }} --clobber

  # Stage 3: Publish the release and sync versions back to master
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master
          token: ${{ github.token }}

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit ${{ github.ref_name }} --draft=false

      # Auto-bump Cargo.toml on master
      - name: Sync version to master
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Update Cargo.toml version
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

          # Commit and push if there are changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml
          if git diff --cached --quiet; then
            echo "No version changes needed"
          else
            git commit -m "chore: bump version to ${VERSION} [skip ci]"
            git push origin master
          fi

  # Stage 4: Update Homebrew tap via PR + auto-merge
  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball SHA256
        id: sha
        run: |
          TAG="${GITHUB_REF_NAME}"
          TARBALL_URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: vimbeldum/homebrew-openwire
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          VERSION="${{ steps.sha.outputs.version }}"
          FORMULA="homebrew-tap/Formula/openwire.rb"

          sed -i "s|archive/refs/tags/v[0-9.]*\.tar\.gz|archive/refs/tags/${TAG}.tar.gz|" "$FORMULA"
          sed -i "s/^  sha256 \".*\"/  sha256 \"${SHA256}\"/" "$FORMULA"

          echo "Formula updated to ${TAG} (sha256: ${SHA256})"
          cat "$FORMULA"

      - name: Create PR and auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ steps.sha.outputs.tag }}"
          VERSION="${{ steps.sha.outputs.version }}"
          BRANCH="bump/${TAG}"

          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/openwire.rb

          if git diff --cached --quiet; then
            echo "Formula already up to date"
            exit 0
          fi

          git commit -m "chore: update openwire to ${TAG}"
          git push origin "$BRANCH"

          # Create PR
          PR_URL=$(gh pr create \
            --repo vimbeldum/homebrew-openwire \
            --title "Update openwire to ${TAG}" \
            --body "Automated formula update for OpenWire ${TAG}." \
            --base master \
            --head "$BRANCH")

          echo "Created PR: $PR_URL"

          # Enable auto-merge (squash) — merges immediately if all checks pass
          gh pr merge "$PR_URL" \
            --repo vimbeldum/homebrew-openwire \
            --auto \
            --squash \
            --delete-branch
